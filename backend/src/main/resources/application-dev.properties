# ── Geliştirme ortamı ──────────────────────────────────────────────────────────
server.port=${SERVER_PORT:8081}

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/planus
spring.datasource.username=${DB_USER:ulassancakli}
spring.datasource.password=${DB_PASS:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA — Flyway şemayı yönetir, Hibernate sadece doğrular
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway — mevcut DB'yi baseline'a alır (V1 tabloları zaten var)
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.locations=classpath:db/migration
