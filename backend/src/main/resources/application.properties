spring.application.name=project-manager

# Aktif profil: SPRING_PROFILES_ACTIVE=prod ile override edilir
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# JWT
app.jwt.secret=${JWT_SECRET:planUS-super-secret-key-change-in-production-min-256bit}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost,http://localhost:3000,http://localhost:3001}

# Jackson — LocalDateTime vb. Java 8 tarih tiplerini ISO-8601 formatında serialize et
spring.jackson.serialization.write-dates-as-timestamps=false
