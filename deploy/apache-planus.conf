# planUS - Apache VirtualHost Konfigürasyonu
#
# Windows (XAMPP): Bu dosyayı C:\xampp\apache\conf\extra\httpd-vhosts.conf içine ekle
#                  DocumentRoot'u C:/xampp/htdocs/planus olarak ayarla
#
# Linux:           Bu dosyayı /etc/apache2/sites-available/planus.conf olarak kaydet
#                  sudo a2ensite planus && sudo systemctl reload apache2
#                  DocumentRoot'u /var/www/html/planus olarak ayarla
#
# Gerekli modüller (bir kez aktif et):
#   Windows XAMPP : httpd.conf içinde LoadModule proxy_module ve proxy_http_module satırlarını aç
#   Linux         : sudo a2enmod proxy proxy_http rewrite

<VirtualHost *:80>
    # Windows için: DocumentRoot "C:/xampp/htdocs/planus"
    # Linux için  : DocumentRoot "/var/www/html/planus"
    DocumentRoot "/var/www/html/planus"

    # Backend API isteklerini 8081'e yönlendir
    ProxyPreserveHost On
    ProxyPass        /api/ http://localhost:8081/api/
    ProxyPassReverse /api/ http://localhost:8081/api/

    # React SPA — tüm route'ları index.html'e yönlendir
    <Directory "/var/www/html/planus">
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog  logs/planus-error.log
    CustomLog logs/planus-access.log combined
</VirtualHost>
